client_name: Almacena
fiscal_year_start_month: 1
currency: EUR
as_of_date: 2026-04-01

use_cases: [charts]

entities:
  - consolidated
  - ap_foundation

# Currency conversion rates. The profitability KPI file is platform metrics in
# USD; financial taxonomies (taxonomi_*, ap_12_act) are EUR.
#
# Convention: fx_rate = source units per 1 EUR; the loaders divide the source
# value by the rate (EUR = USD / rate). HELD at 1.087 across the whole series for
# trend comparability — prior packs reported at 1.087, so re-converting history at
# a new rate would silently restate previously-published EUR numbers. The April
# monthly average was actually ~1.1686 (euro strengthened); applying it to April
# alone introduced a ~6pp artificial FX step into the volume trend (real April
# GMV MoM −13.9% would have read −19.9%), so per management direction April is
# also held at 1.087. Revisit if a per-month FX presentation is adopted.
currencies:
  USD: 1.087    # USD per EUR — held constant with prior packs (see note above)

# Files load in the order listed. On overlap, last loaded wins.
financial_sources:
  - { file: raw/taxonomi_act_12.xlsx, year: 2025, entity: consolidated,  currency: EUR }
  - { file: raw/ap_12_act.xlsx,       year: 2025, entity: ap_foundation, currency: EUR }
  - { file: raw/taxonomi_consolidated_04.xlsx,  year: 2026, entity: consolidated,  currency: EUR }
  - { file: raw/taxonomi_ap_foundation_04.xlsx, year: 2026, entity: ap_foundation, currency: EUR }

# Operational KPIs (platform metrics — GMV, Funded Amount, Days Outstanding,
# etc.). Format: kpi_wide = rows are KPI names, columns are months.
# dimensionless_kpis: counts, ratios, percentages, days — these pass
# through unconverted even though the source currency is USD.
operational_sources:
  # 2025 KPIs — extracted from the legacy dashboard JSON (see
  # one_offs/build_2025_kpis.py). EUR values used directly, KPI names
  # normalized to match the 2026 Q1 file. 12 months, 19 KPIs.
  - file: raw/almacena_2025_kpis.xlsx
    year: 2025
    entity: ap_foundation
    currency: EUR
    format: kpi_wide
    dimensionless_kpis:
      - "# Invoices"
      - "# Boxes"
      - "Average Days Outstanding"
      - "Cash Drag %"
      - "% GMV Insured"
  # April main profitability — same kpi_wide shape, Jan–Apr 2026, RESTATES
  # Jan–Mar vs the old profitability_q1 (GMV, Net Interest, Gross Profit,
  # Available Funds all recomputed). Note this file DROPPED the "Cash Drag %"
  # and "Gross Profit %" rows the Q1 file had — those KPIs have no 2026 data
  # here (see APR build notes; cash-drag is derived downstream if needed).
  - file: raw/04/profitability_main_apr.xlsx
    year: 2026
    entity: ap_foundation
    currency: USD
    format: kpi_wide
    dimensionless_kpis:
      - "# Invoices"
      - "# Boxes"
      - "Docs"
      - "Average Days Outstanding"
      - "Cash Drag %"
      - "Gross Profit %"
      - "% GMV Insured"

# Brand — legacy dashboard's design system (tokens.json's deep-teal palette).
# tokens_preset wires KPI border colour, value text colour, trend arrow
# colours, and the chart-series palette from
# _archive/dashboard/tokens.json. primary/accent/budget still appear
# first in the palette so per-spec colour overrides keep working.
brand:
  primary: "#013E3F"   # deep teal — tokens.json color.chart.series[0]
  accent:  "#009091"   # mid teal — color.chart.series[2]
  budget:  "#20D9DC"   # bright teal — color.chart.series[3]
  light:   "#E1AA12"   # gold accent — color.chart.series[4]
  font_header: "Segoe UI"
  font_body: "Segoe UI"
  tokens_preset: almacena_archive
