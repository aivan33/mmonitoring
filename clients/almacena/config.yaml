client_name: Almacena
fiscal_year_start_month: 1
currency: EUR
as_of_date: 2026-03-01

use_cases: [charts]

entities:
  - consolidated
  - ap_foundation

# Currency conversion rates. profitability_q1.xlsx is platform KPIs in USD;
# financial taxonomies (taxonomi_act_*, foundation_q1, ap_12_act) are EUR.
#
# Convention: fx_rate = source units per 1 EUR; the loaders divide the
# source value by the rate. So for USD the rate is ~1.087 (today's
# EUR/USD), NOT 0.92. The archived config carried 0.92 which would have
# produced EUR values ~36% too large under the divide convention.
#
# **TODO** confirm with the team: (1) is profitability_q1 actually USD,
# (2) what FX rate to lock in (today's quote, period-end, average, etc.).
currencies:
  USD: 1.087    # USD per EUR — flag for team confirmation

# Files load in the order listed. On overlap, last loaded wins.
financial_sources:
  - { file: raw/taxonomi_act_12.xlsx, year: 2025, entity: consolidated,  currency: EUR }
  - { file: raw/ap_12_act.xlsx,       year: 2025, entity: ap_foundation, currency: EUR }
  - { file: raw/taxonomi_act_q1.xlsx, year: 2026, entity: consolidated,  currency: EUR }
  - { file: raw/foundation_q1.xlsx,   year: 2026, entity: ap_foundation, currency: EUR }

# Operational KPIs (platform metrics — GMV, Funded Amount, Days Outstanding,
# etc.). Format: kpi_wide = rows are KPI names, columns are months.
# dimensionless_kpis: counts, ratios, percentages, days — these pass
# through unconverted even though the source currency is USD.
operational_sources:
  - file: raw/profitability_q1.xlsx
    year: 2026
    entity: ap_foundation
    currency: USD
    format: kpi_wide
    dimensionless_kpis:
      - "# Invoices"
      - "# Boxes"
      - "Docs"
      - "Average Days Outstanding"
      - "Cash Drag %"
      - "Gross Profit %"
      - "% GMV Insured"

# Brand — matches Dec 2025 deck visual style (teal + gold).
brand:
  primary: "#1F4D4D"   # dark teal — Dec deck primary line / bar
  accent:  "#D4A024"   # gold — actual values when paired with budget
  budget:  "#2E7A7A"   # mid teal — budget bars
  light:   "#A8D5D0"   # light aqua — tertiary stacked bands
  font_header: "Calibri"
  font_body: "Calibri"
