# MR → Taxonomi mapping for FaradaIC.
#
# Each entry maps a taxonomi (data, grp, subgroup) key to a row in the
# MR workbook. The loader (core/loaders/mr.py) reads the configured
# month's column from `mr_row` of the named MR sheet and writes it into
# the taxonomi at the keyed cell.
#
# Conventions:
#   - mr_row is 1-indexed (matches openpyxl).
#   - mr_label is the exact label at that MR row, INCLUDING any trailing
#     whitespace. Used for the label-vs-row-index fallback: if mr_row's
#     label doesn't match mr_label, the loader searches for mr_label in
#     the sheet and warns. Catches accountant-side row reorders.
#   - mr_row: null means there is no MR source for this taxonomi row —
#     either it's a computed/derived figure (e.g. Working Capital), or
#     it's a budget-only row never populated in actuals. The new month's
#     cell stays empty; existing values in the taxonomi are preserved.
#   - The taxonomi row order (and labels) is locked by the existing
#     `taxonomi_act_2026-02.xlsx`. Do not reorder.
#
# Verified MR row numbers from clients/farada/MR_LAYOUT.md by inspection
# on 2026-04-30. The downstream prompt's row numbers are off-by-one for
# the P&L sheet — labels here are authoritative.
#
# **Sign-off pending from user before locking.**

