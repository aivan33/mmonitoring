  - { mr_row: 8,  mr_label: "PP&E",                                    data: "Non-current assets", grp: "Tangible fixed assets",      subgroup: "PP&E" }
  - { mr_row: 9,  mr_label: "Business equipment",                      data: "Non-current assets", grp: "Tangible fixed assets",      subgroup: "Business Equipment" }
  # Current assets (taxonomi 5-8 ↔ MR 13, 14, 15, 16)
  - { mr_row: 13, mr_label: "Prepaid expenses",                        data: "Current assets", grp: "Prepaid expenses",                       subgroup: "Prepaid expenses" }
  - { mr_row: 14, mr_label: "Loans (other negotiable instruments)",    data: "Current assets", grp: "Loans (other negotiable instruments)",   subgroup: "Loans (other negotiable instruments)" }
  - { mr_row: 15, mr_label: "Other receivables ",                      data: "Current assets", grp: "Other receivables",                      subgroup: "Other receivables" }
  - { mr_row: 16, mr_label: "Inventory",                               data: "Current assets", grp: "Inventory",                              subgroup: "Inventory" }
  # Cash (taxonomi 9 ↔ MR 11; note MR label uses "Cash& Cash equivalents", taxonomi uses "Cash and cash equivalents")
  - { mr_row: 11, mr_label: "Cash& Cash equivalents",                  data: "Cash and cash equivalents", grp: "Cash and cash equivalents", subgroup: "Cash and cash equivalents" }
  # Trade receivables (taxonomi 10 ↔ MR 12)
  - { mr_row: 12, mr_label: "Trade receivables",                       data: "Trade receivables", grp: "Trade receivables", subgroup: "Trade receivables" }
  # Equity (taxonomi 11-12 ↔ MR 21-22; "EQUITY" subtotal at r20 is skipped)
  - { mr_row: 21, mr_label: "Share capital",                           data: "Equity", grp: "Share capital",     subgroup: "Share capital" }
  - { mr_row: 22, mr_label: "Retained earnings",                       data: "Equity", grp: "Retained earnings", subgroup: "Retained earnings" }
  # Non-Current Liabilities (taxonomi 13-14 ↔ MR 24-25; "Long-term liabilities" subtotal at r23 is skipped)
  - { mr_row: 24, mr_label: "Loan facility financing",                 data: "Non-Current Liabilities", grp: "Loan facility financing", subgroup: "Loan facility financing" }
  - { mr_row: 25, mr_label: "Grants",                                  data: "Non-Current Liabilities", grp: "Grants",                  subgroup: "Grants" }
  # Current Liabilities (taxonomi 15-17 ↔ MR 28, 29, 30; "Current liabilities" subtotal at r26 is skipped, "Trade payables" at r27 is mapped to taxonomi r18 below)
  - { mr_row: 28, mr_label: "Payables to personnel",                   data: "Current Liabilities", grp: "Payables to personnel", subgroup: "Payables to personnel" }
  - { mr_row: 29, mr_label: "Other payables ",                         data: "Current Liabilities", grp: "Other payables",        subgroup: "Other payables" }
  - { mr_row: 30, mr_label: "Loans (other negotiable instruments)",    data: "Current Liabilities", grp: "Loans (other negotiable instruments)", subgroup: "Loans (other negotiable instruments)" }
  # Trade payables (taxonomi 18 ↔ MR 27 — note MR has it inside Current liabilities section but taxonomi places it as its own data class)
  - { mr_row: 27, mr_label: "Trade payables",                          data: "Trade payables", grp: "Trade payables", subgroup: "Trade payables" }
  # Computed/derived KPI rows — no MR source.
  - { mr_row: null, mr_label: null, data: "Accounts payable turnover", grp: "Accounts payable turnover", subgroup: "Accounts payable turnover",
      note: "KPI ratio. Not in MR; computed if/when needed." }
  - { mr_row: null, mr_label: null, data: "Account receivable turnover", grp: "Account receivable turnover", subgroup: "Account receivable turnover",
      note: "KPI ratio. Not in MR; computed if/when needed." }
  - { mr_row: null, mr_label: null, data: "Working Capital",           grp: "Working Capital",           subgroup: "Working Capital",
      note: "Computed: Current assets − Current liabilities. Not in MR." }

# ---------------------------------------------------------------------------
# Derived KPIs computed during the MR → taxonomi bridge step.
# Four locked formula types (see core/report/mr_to_taxonomi.py):
#   sum, working_capital, turnover_ratio, ap_turnover.
# Source row keys for this client are listed below; the math lives in code.
# ---------------------------------------------------------------------------
kpi_derivations:
  # Gross Fixed Assets = R&D Asset + PP&E + Business Equipment
  - formula: sum
    target: ["Gross Fixed assets", "Gross Fixed assets", "Gross Fixed assets"]
    statement_for_target: CF
    sources:
      - { statement: BS, key: ["Non-current assets", "Non-tangible fixed assets", "Research and Development Asset"] }
      - { statement: BS, key: ["Non-current assets", "Tangible fixed assets", "PP&E"] }
      - { statement: BS, key: ["Non-current assets", "Tangible fixed assets", "Business Equipment"] }

  # Working Capital = Total Current Assets − Total Current Liabilities
  - formula: working_capital
    target: ["Working Capital", "Working Capital", "Working Capital"]
    statement_for_target: BS
    current_assets:
      - { statement: BS, key: ["Current assets", "Prepaid expenses", "Prepaid expenses"] }
      - { statement: BS, key: ["Current assets", "Loans (other negotiable instruments)", "Loans (other negotiable instruments)"] }
      - { statement: BS, key: ["Current assets", "Other receivables", "Other receivables"] }
      - { statement: BS, key: ["Current assets", "Inventory", "Inventory"] }
      - { statement: BS, key: ["Cash and cash equivalents", "Cash and cash equivalents", "Cash and cash equivalents"] }
      - { statement: BS, key: ["Trade receivables", "Trade receivables", "Trade receivables"] }
    current_liabilities:
      - { statement: BS, key: ["Current Liabilities", "Payables to personnel", "Payables to personnel"] }
      - { statement: BS, key: ["Current Liabilities", "Other payables", "Other payables"] }
      - { statement: BS, key: ["Current Liabilities", "Loans (other negotiable instruments)", "Loans (other negotiable instruments)"] }
      - { statement: BS, key: ["Trade payables", "Trade payables", "Trade payables"] }

  # AR Turnover = Sales / avg(begin TR, end TR)
  - formula: turnover_ratio
    target: ["Account receivable turnover", "Account receivable turnover", "Account receivable turnover"]
    statement_for_target: BS
    store_as: float
    numerator:
      type: data_aggregate
      source: IS
      data: Sales
    avg_balance_key:
      statement: BS
      key: ["Trade receivables", "Trade receivables", "Trade receivables"]

  # AP Turnover = (CoS + OPEX − Personnel) / avg(begin TP, end TP)
  - formula: ap_turnover
    target: ["Accounts payable turnover", "Accounts payable turnover", "Accounts payable turnover"]
    statement_for_target: BS
    store_as: float
    cost_data_classes: ["Cost of Sales", "R&D", "S&M", "G&A"]
    personnel_keys:
      - ["Cost of Sales", "Total Payroll", "Total Payroll"]
      - ["R&D", "Total Payroll", "Germany"]
      - ["R&D", "Total Payroll", "Serbia"]
      - ["S&M", "Total Payroll", "Total Payroll"]
      - ["G&A", "Total Payroll", "Total Payroll"]
    avg_balance_key:
      statement: BS
      key: ["Trade payables", "Trade payables", "Trade payables"]

# ---------------------------------------------------------------------------
# Known good prior-month discrepancies between MR and Taxonomi.
# Reconcile (Phase F2 Task 8) groups these under "Known" so they don't
# trip the alert each month.
# ---------------------------------------------------------------------------
known_discrepancies:
  - period: 2026-01-01
    statement: IS
    taxonomi_key: ["Cost of Sales", "COGS", "COGS"]
    reason: |
      MR P&L COGS Jan = €2,403; taxonomi shows €52,403. Confirmed accounting-side as
      a known intentional difference — taxonomi aggregates additional accounts that
      MR booked elsewhere. Updated from accounting; do NOT flag as new deviation.
  - period: 2026-02-01
    statement: BS
    taxonomi_key: ["Current assets", "Other receivables", "Other receivables"]
    reason: |
      MR BS Other receivables Feb = €83,072; taxonomi shows €33,072. Confirmed
      accounting-side as a known intentional difference (€50K reclassification).
      Updated from accounting; do NOT flag as new deviation.
