# MR -> Taxonomi mapping for Undelucram. Auto-generated by
# one_offs/gen_mapping.py, then reviewed. Source layout in MR_LAYOUT.md.
#
# mr_row is 1-indexed; mr_label is the EXACT MR label (incl. trailing
# whitespace) used for the loader's label-vs-row fallback. mr_row: null
# = no MR source (derived KPI or no line yet).

mr_layout:
  IS: { sheet: "Income Statement",   header_row: 2, label_col: 2, period_format: month_name }
  CF: { sheet: "Cash Flow Statement", header_row: 2, label_col: 1, period_format: month_name }
  BS: { sheet: "Balance Sheet",       header_row: 2, label_col: 1, period_format: month_name }

