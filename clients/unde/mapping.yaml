kpi_derivations:
  # Working Capital = current assets - current liabilities (reproduces Mar 68,081.8).
  - statement_for_target: BS
    target: ["Working Capital", "Working Capital", "Working Capital"]
    formula: working_capital
    store_as: float
    current_assets:
      - { statement: BS, key: ["Current assets", "Other receivables", "Other receivables"] }
      - { statement: BS, key: ["Current assets", "Tax receivable", "Tax receivable"] }
      - { statement: BS, key: ["Current assets", "Pre-paid expenses", "Pre-paid expenses"] }
      - { statement: BS, key: ["Cash and cash equivalents", "Cash and cash equivalents", "Cash and cash equivalents"] }
      - { statement: BS, key: ["Trade receivables", "Trade receivables", "Trade receivables"] }
    current_liabilities:
      - { statement: BS, key: ["Current Liabilities", "Payables to personnel", "Payables to personnel"] }
      - { statement: BS, key: ["Current Liabilities", "Deferred revenue", "Deferred revenue"] }
      - { statement: BS, key: ["Current Liabilities", "Tax payable", "Tax payable"] }
      - { statement: BS, key: ["Current Liabilities", "Other payables", "Other payables"] }
      - { statement: BS, key: ["Trade payables", "Trade payables", "Trade payables"] }

  # Gross Fixed assets = sum of BS fixed-asset rows (reproduces Mar 198,195.3).
  - statement_for_target: CF
    target: ["Gross Fixed assets", "Gross Fixed assets", "Gross Fixed assets"]
    formula: sum
    store_as: float
    sources:
      - { statement: BS, key: ["Non-current assets", "Non-tangible fixed assets", "Trademark & Patents"] }
      - { statement: BS, key: ["Non-current assets", "Non-tangible fixed assets", "Research and Development Asset"] }
      - { statement: BS, key: ["Non-current assets", "Tangible fixed assets", "Property, plant and equipment"] }
      - { statement: BS, key: ["Non-current assets", "Tangible fixed assets", "Fixtures and fittings"] }

  # Account receivable turnover = Sales / avg(Trade receivables).
  - statement_for_target: BS
    target: ["Account receivable turnover", "Account receivable turnover", "Account receivable turnover"]
    formula: turnover_ratio
    store_as: float
    numerator: { type: data_aggregate, source: IS, data: "Sales" }
    avg_balance_key: { statement: BS, key: ["Trade receivables", "Trade receivables", "Trade receivables"] }

  # Accounts payable turnover = (opex - personnel) / avg(Trade payables).
  - statement_for_target: BS
    target: ["Accounts payable turnover", "Accounts payable turnover", "Accounts payable turnover"]
    formula: ap_turnover
    store_as: float
    cost_data_classes: ["Cost of Sales", "S&M", "G&A", "R&D"]
    personnel_keys:
      - ["Cost of Sales", "Payroll CoS", "Payroll CoS"]
      - ["R&D", "Payroll R&D", "Payroll R&D"]
      - ["G&A", "Payroll G&A", "Payroll G&A"]
    avg_balance_key: { statement: BS, key: ["Trade payables", "Trade payables", "Trade payables"] }


# Rows that intentionally do NOT reconcile to the management report — do not
# re-investigate each month unless the underlying source changes.
known_discrepancies:
  - statement: IS
    taxonomi_key: ["MRR", "MRR", "MRR"]
    reason: |
      Taxonomi MRR is the MRR-classified revenue produced in the MRR Schedule
      (workstream B), e.g. Mar 2026 = EUR 106,353. The management report's own
      "MRR" row is total Sales (Mar EUR 108,417). Left null here; populated in
      the MRR-schedule step.
  - statement: BS
    taxonomi_key: ["Accounts payable turnover", "Accounts payable turnover", "Accounts payable turnover"]
    reason: |
      Derived KPI; our ap_turnover basis (CoS+S&M+G&A+R&D less the three main
      payroll lines, over avg trade payables) gives ~0.7 vs the client's 0.4.
      The client's exact opex/personnel basis is unconfirmed. Best-effort only.
  - statement: CF
    taxonomi_key: ["LinkedIn Learning (share)", null, null]
    reason: |
      Cost of Sales | "LinkedIn Learning (share)" is mapped to MR "Other CoS"
      (A021) as a best guess (zero in Mar; EUR 14,771 in Apr). Confirm the
      correct destination with the client's chart of accounts.

