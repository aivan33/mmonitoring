client_name: Honey
fiscal_year_start_month: 1
currency: EUR
as_of_date: 2026-03-01

use_cases: [report]

entities:
  - honey

# Files load in the order listed. On overlap, last loaded wins.
financial_sources:
  - { file: raw/taxonomi_act_2026-03.xlsx, year: 2026, entity: honey, currency: EUR }
  - { file: raw/export-2026-bp.xlsx,       year: 2026, entity: honey, currency: EUR }

# Reporting pipeline configuration.
# `mapping.yaml` is not yet authored — running build_report.py will fail
# at the extract phase until it exists. See README.md for status.
reporting:
  mr_source: raw/main_26.xlsx
  mapping: mapping.yaml
  variance_thresholds:
    flag_pct: 20
    flag_eur: 10000
    reconcile_eur: 5

# Operational data (B2C subscription flow) is not yet modeled in core/data/.
# Slide-4 charts are produced by clients/honey/one_offs/build_slide4.py
# until the operational data layer lands.
