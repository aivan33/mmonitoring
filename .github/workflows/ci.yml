name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure LibreOffice (model recalc gate)
        # ubuntu-latest ships LibreOffice; only install if it's missing, so the
        # model gate tests run (not skipif) without paying the ~400MB install
        # cost on runners that already have it.
        run: |
          which soffice || which libreoffice || \
            (sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-calc)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -q
